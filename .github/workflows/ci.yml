name: CI

# Trigger the workflow on push or pull request, but only for the master branch
on:
  push:
    branches:
    - master
  pull_request:

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # TODO: Not sure how to cache this one.. cachix?
  nix:
    name: nix / ${{ matrix.ghc }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Keep in sync with the tested-with field in circuit-notation.cabal
        # (the names come from clash-compiler's supportedGhcVersions).
        ghc: [ghc967, ghc984, ghc9103, ghc9124]
    steps:
      - uses: actions/checkout@v3
      - uses: cachix/install-nix-action@v31

      # Builds the package (whose own check phase runs the unit tests) and
      # then runs all test suites against it, for this ghc version.
      - name: Build and test
        run: |
          nix build -L .#checks.x86_64-linux.${{ matrix.ghc }}

  cabal:
    name: ${{ matrix.os }} / ghc ${{ matrix.ghc }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        cabal: ["latest"]
        ghc:
          - "9.6.7"
          - "9.8.4"
          - "9.10.3"
          - "9.12.4"

    steps:
    - uses: actions/checkout@v3

    - uses: haskell-actions/setup@v2
      id: setup-haskell-cabal
      name: Setup Haskell
      with:
        ghc-version: ${{ matrix.ghc }}
        cabal-version: ${{ matrix.cabal }}

    - name: Freeze
      run: |
        cabal update
        cabal freeze

    - uses: actions/cache@v4
      name: Cache ~/.cabal/store
      with:
        path: ${{ steps.setup-haskell-cabal.outputs.cabal-store }}
        key: ${{ runner.os }}-${{ matrix.ghc }}-${{ hashFiles('cabal.project.freeze', 'cabal.project') }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.ghc }}-

    - name: Build
      run: |
        cabal build all --write-ghc-environment-files=always
        ghc -Wall -Werror -iexample Example
        ghc -Wall -Werror -iexample Testing

    - name: Test
      run: |
        cabal test all
